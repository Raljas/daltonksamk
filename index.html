<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --green:#00ff41;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:url('https://raw.githubusercontent.com/lfillaz/lfillaz/main/lazdiscord.gif') no-repeat center center fixed;
    background-size:cover;
    font-family:'Cairo','Orbitron',Arial;
    color:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
}

/* الصورة */
img{
    width:min(450px,90%);
    border-radius:12px;
    margin-bottom:20px;
}

/* لوحة المعلومات */
.panel{
    background:rgba(0,0,0,0.6);
    padding:20px;
    border:1px solid #222;
    border-radius:12px;
    width:min(600px,95%);
    box-shadow:0 0 20px rgba(0,255,65,0.2);
}

/* النصوص */
.row{
    font-size:1.3rem;
    font-weight:bold;
    letter-spacing:1px;
    margin:8px 0;
}

.lbl{
    color:var(--green);
}

.val{
    font-size:1.4rem;
    color:#fff;
}

/* التوقيع */
.signature{
    margin-top:20px;
    font-size:2.5rem;
    letter-spacing:10px;
    text-shadow:0 0 20px #fff,0 0 40px var(--green);
}

/* الأسماء تحت */
.bottom-names{
    position:fixed;
    bottom:10px;
    width:100%;
    text-align:center;
    font-size:1.1rem;
    font-weight:900;
    letter-spacing:2px;
    color:#fff;
    text-shadow:0 0 10px #fff,0 0 20px var(--green);
}

/* رسالة */
.click-msg{
    margin-top:10px;
    opacity:.7;
    font-size:0.9rem;
}
</style>
</head>

<body>

<img src="https://raw.githubusercontent.com/lfillaz/lfillaz/main/lazdiscord.gif">

<!-- الصوت -->
<audio id="music" autoplay loop muted>
  <source src="https://mp3tourl.com/audio/1776544456535-dd2b2a12-bea2-458d-97a6-7f753f4c7816.mp3" type="audio/mpeg">
</audio>

<!-- لوحة المعلومات (مرتبة) -->
<div class="panel">

    <div class="row">
        <span class="lbl">IP:</span>
        <span class="val" id="ip">loading...</span>
    </div>

    <div class="row">
        hacked by 60vk - 2u3y - Zx1 - ابو خلود - كريزما
    </div>

    <div class="row">
        دالتون تناك نيك
    </div>

    <div class="row">
        تم تسريب جميع بيانات اللاعبين (مواقعهم - معلوماتهم - IP)
    </div>

</div>

<div class="signature">discord.gg/mt4</div>


<script>
const audio = document.getElementById("music");

['click','touchstart','keydown','mousemove'].forEach(e=>{
    document.addEventListener(e, () => {
        audio.muted = false;
        audio.play();
    }, { once:true });
});

fetch('https://ipinfo.io/json')
.then(r=>r.json())
.then(d=>{
    document.getElementById('ip').textContent = d.ip;
});
</script>

</body>
</html>
