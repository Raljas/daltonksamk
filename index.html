<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#050505;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* الخلفية */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at center,rgba(255,255,255,.04),transparent 60%),
        linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
    background-size:100% 100%,45px 45px,45px 45px;
    animation:bgMove 10s linear infinite;
}

@keyframes bgMove{
    from{transform:translateY(0);}
    to{transform:translateY(45px);}
}

.container{
    position:relative;
    z-index:1;
    text-align:center;
}

.ds{
    color:#fff;
    font-size:170px;
    font-weight:900;
    letter-spacing:12px;
    text-shadow:
        0 0 20px rgba(255,255,255,.35),
        0 0 50px rgba(255,255,255,.15);
}

.discord{
    margin-top:25px;
    font-size:52px;
    font-weight:700;
    color:#7fa7ff;
    letter-spacing:3px;
    text-shadow:0 0 20px rgba(127,167,255,.4);
}
</style>
</head>
<body>

<div class="container">
    <div class="ds">وحيد هنا</div>
    <div class="discord">discord.gg/0zz</div>
</div>

</body>
</html>
