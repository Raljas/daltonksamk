<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2hmn x KX Panel</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Tahoma;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  text-align:center;
}

img{
  width:420px;
  height:260px;
  object-fit:cover;
  border-radius:10px;
}

.info{
  margin:8px 0;
  font-size:18px;
}

.title{
  font-size:50px;
  color:red;
  margin:10px 0;
}

/* Rainbow Discord */
.discord {
  font-size:32px;
  font-weight:bold;
  margin-top:25px;
  animation: rainbow 3s infinite linear;
}

@keyframes rainbow {
  0% { color:red; }
  20% { color:orange; }
  40% { color:yellow; }
  60% { color:lime; }
  80% { color:deepskyblue; }
  100% { color:violet; }
}
</style>
</head>

<body>

<div class="container">

  <div id="media-placeholder">
    <img src="img.gif" alt="">
  </div>

  <div class="title">#discord.gg/0zz</div>

  <div class="info" id="os">OS: Loading...</div>
  <div class="info" id="screen">RES: ...</div>
  <div class="info" id="browser">Browser: Loading...</div>
  <div class="info" id="gpu">GPU: Loading...</div>

  <div class="discord">كس امكم يقحيب علي كس ام الشيعة والعراق كلها</div>
  

</div>

<script>
(() => {

const mediaUrl = "https://cdn.discordapp.com/attachments/1517681692389933258/1518079068694642738/df3c66e1d49f31796a5f9b3bed160f4d.webp?ex=6a389cce&is=6a374b4e&hm=70259e91b3eb7fb0d37b34aad50933da287154516bd1331345baaa03751aab61&animated=true";
document.getElementById('media-placeholder').innerHTML =
`<img src="${mediaUrl}">`;

// Browser detect
function getBrowserInfo() {
  const ua = navigator.userAgent;
  if (ua.includes("Edg")) return "Microsoft Edge";
  if (ua.includes("Chrome")) return "Google Chrome";
  if (ua.includes("Firefox")) return "Mozilla Firefox";
  if (ua.includes("Safari")) return "Apple Safari";
  return "Unknown Browser";
}

// GPU detect
function getGPU(){
  try{
    const canvas = document.createElement("canvas");
    const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");

    if(!gl){
      document.getElementById("gpu").textContent = "GPU: Not Available";
      return;
    }

    const debug = gl.getExtension("WEBGL_debug_renderer_info");

    if(debug){
      const gpu = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL);
      document.getElementById("gpu").textContent = "GPU: " + gpu;
    } else {
      document.getElementById("gpu").textContent = "GPU: Hidden";
    }
  }catch(e){
    document.getElementById("gpu").textContent = "GPU: Error";
  }
}

// Main info
function initData(){

  document.getElementById('os').textContent =
    "OS: " + (navigator.platform || "Desktop System");

  document.getElementById('screen').textContent =
    "RES: " + screen.width + "x" + screen.height;

  document.getElementById('browser').textContent =
    "Browser: " + getBrowserInfo();

  getGPU();
}

initData();

// disable right click
document.addEventListener('contextmenu', e => e.preventDefault());

})();
</script>

</body>
</html>

<audio id="bgSound" loop>
  <source src="https://mp3tourl.com/audio/1782008703129-ff975a93-e975-4d0e-bbbd-12bada0e010c.mp3" type="audio/mpeg">
</audio>

<script>
function tryPlay() {
  const audio = document.getElementById("bgSound");
  audio.volume = 0.5;

  audio.play().catch(() => {
    // إذا فشل التشغيل ينتظر أي تفاعل
    const start = () => {
      audio.play();
      document.removeEventListener("click", start);
      document.removeEventListener("touchstart", start);
      document.removeEventListener("keydown", start);
    };

    document.addEventListener("click", start);
    document.addEventListener("touchstart", start);
    document.addEventListener("keydown", start);
  });
}

window.addEventListener("load", tryPlay);
</script>
